<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>✨ Minimalist Todo App | Clean & Modern</title>
    <style>
        /* RESET & GLOBAL STYLES - Modern, clean, responsive */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Inter', 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f3f6fc 0%, #e9eef5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* Main app card - glassmorphism + modern shadows */
        .todo-card {
            max-width: 650px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.02);
            padding: 2rem 1.8rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        @media (max-width: 480px) {
            .todo-card {
                padding: 1.5rem 1.2rem;
                border-radius: 1.5rem;
            }
        }

        /* Header section */
        .app-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .app-header h1 {
            font-size: 2rem;
            font-weight: 650;
            background: linear-gradient(135deg, #1f2b3c, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .app-header p {
            color: #5b6e8c;
            font-size: 0.9rem;
            margin-top: 0.4rem;
            font-weight: 450;
        }

        /* Input row - flex, clean */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .input-field {
            flex: 1;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1.8rem;
            background: #ffffff;
            transition: all 0.2s;
            outline: none;
            color: #1e293b;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .input-field:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .input-field::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        /* Primary add button */
        .add-btn {
            background: #3b82f6;
            border: none;
            padding: 0 1.8rem;
            border-radius: 2.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(59,130,246,0.25);
            letter-spacing: 0.3px;
        }
        .add-btn:hover {
            background: #2563eb;
            transform: scale(0.98);
            box-shadow: 0 6px 12px rgba(37,99,235,0.3);
        }
        .add-btn:active {
            transform: scale(0.96);
        }

        /* Stats bar - subtle */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.2rem;
            font-size: 0.8rem;
            color: #475569;
            border-bottom: 1px solid #eef2f8;
            padding-bottom: 0.6rem;
        }
        .task-count {
            background: #eef2ff;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.75rem;
            color: #1e40af;
        }

        /* Task list container */
        .task-list-container {
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
            margin-top: 0.5rem;
        }
        /* custom scroll */
        .task-list-container::-webkit-scrollbar {
            width: 5px;
        }
        .task-list-container::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        .task-list-container::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Task item - modern card style */
        .todo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            margin-bottom: 12px;
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02), 0 1px 2px rgba(0,0,0,0.03);
            border: 1px solid #edf2f7;
            transition: all 0.2s;
        }
        .todo-item:hover {
            border-color: #cbdff2;
            background: #fefefe;
            box-shadow: 0 8px 15px -10px rgba(0,0,0,0.08);
        }

        /* left side: checkbox + text */
        .task-content {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            cursor: pointer;
        }
        .custom-check {
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #3b82f6;
            cursor: pointer;
            margin: 0;
            transition: 0.1s;
        }
        .task-text {
            font-size: 1rem;
            font-weight: 500;
            color: #0f172a;
            word-break: break-word;
            transition: 0.2s;
            padding-right: 8px;
        }
        /* Strike-through style for completed tasks */
        .completed-task {
            text-decoration: line-through;
            color: #94a3b8;
            font-weight: 450;
        }

        /* Delete button - modern minimal */
        .delete-btn {
            background: transparent;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: #cbd5e1;
            padding: 6px 8px;
            border-radius: 40px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .delete-btn:hover {
            background: #fee2e2;
            color: #e11d48;
            transform: scale(1.05);
        }
        .delete-btn:active {
            transform: scale(0.95);
        }

        /* Empty state message */
        .empty-message {
            text-align: center;
            padding: 2.5rem 1rem;
            color: #94a3b8;
            font-size: 0.9rem;
            background: #fafcff;
            border-radius: 1.5rem;
            margin-top: 10px;
            border: 1px dashed #cbd5e1;
        }

        /* small animations */
        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .todo-item {
            animation: fadeSlide 0.2s ease forwards;
        }

        /* Responsive touch optimizations */
        button, .task-content {
            cursor: pointer;
            user-select: none;
        }
        @media (max-width: 500px) {
            .add-btn {
                padding: 0 1.2rem;
                font-size: 0.9rem;
            }
            .todo-item {
                padding: 0.7rem 0.9rem;
            }
            .task-text {
                font-size: 0.9rem;
            }
        }
        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1.8rem;
            color: #7c8ba0;
            border-top: 1px solid #ecf3fa;
            padding-top: 1.2rem;
        }
    </style>
</head>
<body>
<div class="todo-card">
    <div class="app-header">
        <h1>📝 TaskFlow</h1>
        <p>stay organized, stay productive</p>
    </div>

    <!-- Input field + Add Task button - fully functional -->
    <div class="input-group">
        <input type="text" id="taskInput" class="input-field" placeholder="Write a new task... e.g., 'Buy groceries'" autocomplete="off">
        <button id="addTaskBtn" class="add-btn">➕ Add Task</button>
    </div>

    <!-- stats bar for better UX -->
    <div class="stats-bar">
        <span>📋 Your tasks</span>
        <span class="task-count" id="taskCounter">0 tasks</span>
    </div>

    <!-- Dynamic task list container -->
    <div class="task-list-container" id="taskListContainer">
        <!-- tasks injected via JS -->
    </div>
    <footer>✓ click text or checkbox to mark done • tasks saved automatically</footer>
</div>

<script>
    // ---------- TODO APP LOGIC ----------
    // This app includes:
    // - Add new tasks
    // - Delete each task
    // - Mark as completed (strike-through via CSS)
    // - Persistent Local Storage (saves tasks after refresh)
    // - Modern, responsive, clean design
    // - Beginner-friendly comments

    // 1. Grab DOM elements
    const taskInput = document.getElementById('taskInput');
    const addButton = document.getElementById('addTaskBtn');
    const taskContainer = document.getElementById('taskListContainer');
    const taskCounterSpan = document.getElementById('taskCounter');

    // 2. Tasks array - each task will be an object: { id, text, completed }
    let tasks = [];

    // ---------- Helper Functions ----------

    // Update local storage: save current tasks array to browser's localStorage
    function saveTasksToLocalStorage() {
        localStorage.setItem('todoApp_tasks', JSON.stringify(tasks));
    }

    // Load tasks from localStorage when page loads
    function loadTasksFromLocalStorage() {
        const storedTasks = localStorage.getItem('todoApp_tasks');
        if (storedTasks) {
            tasks = JSON.parse(storedTasks);
        } else {
            // Default demo tasks to show functionality (optional but user-friendly)
            tasks = [
                { id: Date.now() + 1, text: '🌟 Click to mark completed', completed: false },
                { id: Date.now() + 2, text: '✏️ Add your own tasks above', completed: false },
                { id: Date.now() + 3, text: '🗑️ Press delete to remove', completed: true }
            ];
            // Save default tasks to storage once (so they persist)
            saveTasksToLocalStorage();
        }
        renderTasks();      // render after loading data
    }

    // Update the task counter display (pending / total)
    function updateTaskCounter() {
        const totalTasks = tasks.length;
        const completedTasks = tasks.filter(task => task.completed === true).length;
        if (totalTasks === 0) {
            taskCounterSpan.innerText = `0 tasks`;
        } else {
            taskCounterSpan.innerText = `${completedTasks}/${totalTasks} done`;
        }
    }

    // Render all tasks to the DOM based on current 'tasks' array
    function renderTasks() {
        // Clear the container first
        taskContainer.innerHTML = '';

        if (tasks.length === 0) {
            // Show empty state placeholder
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-message';
            emptyDiv.innerHTML = '✨ No tasks yet. Add something to stay productive! ✨';
            taskContainer.appendChild(emptyDiv);
            updateTaskCounter();
            return;
        }

        // Loop through each task and create a list item
        tasks.forEach(task => {
            // Create main todo-item div
            const todoItem = document.createElement('div');
            todoItem.classList.add('todo-item');
            todoItem.setAttribute('data-id', task.id);

            // Left side: checkbox + text wrapper (clickable for completion)
            const taskContent = document.createElement('div');
            taskContent.className = 'task-content';

            // Checkbox for completed status
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'custom-check';
            checkbox.checked = task.completed;   // reflect current completed state
            // Event listener: toggle completed when checkbox changes
            checkbox.addEventListener('change', (e) => {
                // Prevent event bubbling if needed, but it's fine
                toggleTaskCompletion(task.id, checkbox.checked);
            });

            // Task text span
            const taskTextSpan = document.createElement('span');
            taskTextSpan.className = 'task-text';
            taskTextSpan.innerText = task.text;
            // Apply strike-through style if task is completed
            if (task.completed) {
                taskTextSpan.classList.add('completed-task');
            } else {
                taskTextSpan.classList.remove('completed-task');
            }

            // Make clicking on the text or checkbox area also toggle completion (better UX)
            // We'll attach an event to the whole taskContent (except delete button area)
            // but the checkbox already toggles individually, we need to avoid double toggle.
            // For better UX: click on text also toggles checkbox.
            taskContent.addEventListener('click', (event) => {
                // Important: if the click originated from the checkbox itself, we skip because checkbox change event already handles.
                if (event.target !== checkbox) {
                    // Toggle the completion state manually
                    const newCompletedState = !task.completed;
                    toggleTaskCompletion(task.id, newCompletedState);
                    // Also update checkbox UI (but toggleTaskCompletion re-renders whole list, so not strictly needed)
                    // However we prevent event propagation to avoid double toggling due to checkbox change?
                    // Since we re-render, it's safe to stop propagation? better to let checkbox do its own job.
                    // But because we re-render on toggle, we can prevent default clash:
                    event.preventDefault();
                    // but we manually call toggle function, that's fine.
                }
            });

            // Assemble left side: checkbox and text
            taskContent.appendChild(checkbox);
            taskContent.appendChild(taskTextSpan);

            // Delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.innerHTML = '🗑️';
            deleteBtn.className = 'delete-btn';
            deleteBtn.setAttribute('aria-label', 'Delete task');
            // Delete functionality: remove task by id
            deleteBtn.addEventListener('click', (event) => {
                event.stopPropagation();   // prevent triggering taskContent click
                deleteTaskById(task.id);
            });

            // Append left content + delete button to todo-item
            todoItem.appendChild(taskContent);
            todoItem.appendChild(deleteBtn);

            taskContainer.appendChild(todoItem);
        });

        // Update counter after rendering
        updateTaskCounter();
    }

    // Helper: toggle completion status of a specific task
    function toggleTaskCompletion(taskId, isCompleted) {
        // Find task index
        const taskIndex = tasks.findIndex(task => task.id === taskId);
        if (taskIndex !== -1) {
            tasks[taskIndex].completed = isCompleted;
            // Save updated tasks to localStorage
            saveTasksToLocalStorage();
            // Re-render to reflect strike-through and visual changes
            renderTasks();
        }
    }

    // Delete task by ID
    function deleteTaskById(taskId) {
        // Filter out the task with matching id
        tasks = tasks.filter(task => task.id !== taskId);
        // Save updated array to localStorage
        saveTasksToLocalStorage();
        // Re-render the task list
        renderTasks();
    }

    // Add new task: gets text from input field, creates unique id, pushes to tasks array
    function addNewTask() {
        // Get trimmed value from input
        let taskText = taskInput.value.trim();

        // Validation: prevent empty tasks or only spaces
        if (taskText === "") {
            // Gentle alert or feedback: but we add micro interaction
            taskInput.placeholder = "Please enter a task!";
            taskInput.style.borderColor = "#f97316";
            setTimeout(() => {
                taskInput.style.borderColor = "#e2e8f0";
                taskInput.placeholder = "Write a new task... e.g., 'Buy groceries'";
            }, 1200);
            return;
        }

        // Create new task object
        const newTask = {
            id: Date.now(),            // unique timestamp id
            text: taskText,
            completed: false
        };

        // Push to tasks array
        tasks.push(newTask);
        // Save to localStorage
        saveTasksToLocalStorage();
        // Clear input field
        taskInput.value = "";
        // Focus back on input for better UX
        taskInput.focus();
        // Re-render the list to show new task
        renderTasks();
    }

    // Optional: Allow pressing "Enter" key inside input field to add task quickly
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            addNewTask();
        }
    }

    // ---------- INITIALIZATION & EVENT LISTENERS ----------
    function initApp() {
        // Load existing tasks from localStorage (or default demo tasks)
        loadTasksFromLocalStorage();

        // Attach event listeners
        addButton.addEventListener('click', addNewTask);
        taskInput.addEventListener('keypress', handleKeyPress);

        // Focus input on page load (nice to have)
        taskInput.focus();
    }

    // Start everything when the DOM is fully loaded
    document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
